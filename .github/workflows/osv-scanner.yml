name: OSV-Scanner
'on':
  pull_request:
    branches:
      - main
  merge_group:
    branches:
      - main
  schedule:
    - cron: 28 1 * * 0
  push:
    branches:
      - main
permissions:
  security-events: write
  contents: read
jobs:
  scan-scheduled:
    if: '${{ github.event_name == ''push'' || github.event_name == ''schedule'' }}'
    uses: >-
      google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@1f1242919d8a60496dd1874b24b62b2370ed4c78
    with:
      scan-args: |-
        -r
        --skip-git
        ./
  scan-pr:
    if: >-
      ${{ github.event_name == 'pull_request' || github.event_name ==
      'merge_group' }}
    uses: >-
      google/osv-scanner-action/.github/workflows/osv-scanner-reusable-pr.yml@1f1242919d8a60496dd1874b24b62b2370ed4c78
    with:
      scan-args: |-
        -r
        --skip-git
        ./
  comment-pr:
    name: Comment PR with Vulnerabilities
    if: >-
      ${{ github.event_name == 'pull_request' || github.event_name ==
      'merge_group' }}
    needs: scan-pr
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - name: Download SARIF from Security Tab
        uses: actions/github-script@v7
        id: extract
        with:
          script:  |
            const { data: alerts } = await github.request(
              'GET /repos/{owner}/{repo}/code-scanning/alerts',
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                ref: context.payload.pull_request.head.sha
              }
            );

            if (!alerts.length) {
              return "✅ No vulnerabilities found.";
            }

            let output = "### 🔍 OSV Vulnerability Scan Results\n\n";
            for (const alert of alerts) {
              output += `- **${alert.rule.id}** (${alert.rule.severity})\n`;
              output += `  - ${alert.rule.description || "No description"}\n\n`;
            }

            return output;

      - name: Create or Update PR Comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: osv-scan-report
          message: '${{ steps.extract.outputs.result }}'

# InfraGuard: Gradle lockfiles → OSV Scanner v2 → transform.py → POST /api/v1/ingest
#
# OSV-Scanner v2 does NOT treat build.gradle as a Java manifest. It needs at least one of:
#   gradle.lockfile, buildscript-gradle.lockfile, gradle/verification-metadata.xml, pom.xml
# (see https://google.github.io/osv-scanner/supported-languages-and-lockfiles/)
#
# We generate lockfiles in CI with JDK 17 + ./gradlew dependencies --write-locks, then scan.
#
# Optional secrets: INFRAGUARD_PROJECT_ID, INFRAGUARD_URL (defaults below).

name: InfraGuard OSV Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  osv-scan:
    runs-on: ubuntu-latest
    env:
      REPO_NAME: ${{ github.repository }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve InfraGuard target
        shell: bash
        env:
          SECRET_PROJECT_ID: ${{ secrets.INFRAGUARD_PROJECT_ID }}
          SECRET_URL: ${{ secrets.INFRAGUARD_URL }}
        run: |
          set -euo pipefail
          if [ -n "${SECRET_PROJECT_ID}" ]; then
            echo "PROJECT_ID=${SECRET_PROJECT_ID}" >> "$GITHUB_ENV"
          else
            echo "PROJECT_ID=7461ef37-928d-4e74-8b46-8a9a3407c638" >> "$GITHUB_ENV"
          fi
          if [ -n "${SECRET_URL}" ]; then
            echo "INFRAGUARD_URL=${SECRET_URL}" >> "$GITHUB_ENV"
          else
            echo "INFRAGUARD_URL=https://infraguard-production.up.railway.app" >> "$GITHUB_ENV"
          fi

      - name: Set up JDK 17 (for Gradle lockfile generation)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Generate Gradle lockfiles (OSV v2 input)
        shell: bash
        env:
          GRADLE_OPTS: "-Xmx2048m -Dorg.gradle.daemon=false -Dfile.encoding=UTF-8"
        run: |
          set -euo pipefail
          sed -i 's/\r$//' gradlew
          chmod +x gradlew
          ./gradlew --no-daemon dependencies --write-locks
          ./gradlew --no-daemon buildEnvironment --write-locks
          ls -la gradle.lockfile buildscript-gradle.lockfile 2>/dev/null || true
          test -f gradle.lockfile || { echo "gradle.lockfile was not created"; exit 1; }

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install osv-scanner
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL https://github.com/google/osv-scanner/releases/latest/download/osv-scanner_linux_amd64 -o osv-scanner
          chmod +x osv-scanner
          sudo mv osv-scanner /usr/local/bin/osv-scanner

      - name: Run OSV scan (lockfiles)
        shell: bash
        run: |
          set -euo pipefail
          set +e
          osv-scanner scan source -r . --format json > /tmp/osv-report.json
          rc=$?
          set -e
          if [ "$rc" -ne 0 ] && [ "$rc" -ne 1 ]; then
            echo "osv-scanner failed with exit code $rc"
            exit "$rc"
          fi
          if [ ! -s /tmp/osv-report.json ]; then
            echo '{"results":[]}' > /tmp/osv-report.json
          fi

      - name: Transform for InfraGuard (/api/v1/ingest)
        id: transform
        shell: bash
        run: |
          set -euo pipefail
          python transform.py \
            --input /tmp/osv-report.json \
            --output /tmp/infraguard-ingest.json \
            --project-id "${PROJECT_ID}" \
            --repo-name "${REPO_NAME}"
          VULN_COUNT=$(python3 -c "import json; print(len(json.load(open('/tmp/infraguard-ingest.json'))['vulnerabilities']))")
          echo "count=$VULN_COUNT" >> "$GITHUB_OUTPUT"
          echo "## OSV → InfraGuard" >> "$GITHUB_STEP_SUMMARY"
          echo "Vulnerabilities in ingest payload: **$VULN_COUNT**" >> "$GITHUB_STEP_SUMMARY"
          echo "InfraGuard URL: \`${INFRAGUARD_URL}\`" >> "$GITHUB_STEP_SUMMARY"
          python3 << 'PY'
          import json
          with open("/tmp/osv-report.json") as f:
              d = json.load(f)
          for r in d.get("results", []):
              for p in r.get("packages", []):
                  for v in p.get("vulnerabilities", []):
                      print(v.get("id", ""), "-", (v.get("summary") or "")[:140])
          PY

      - name: Upload OSV JSON
        uses: actions/upload-artifact@v4
        with:
          name: osv-report
          path: /tmp/osv-report.json

      - name: Upload InfraGuard payload (debug)
        uses: actions/upload-artifact@v4
        with:
          name: infraguard-ingest
          path: /tmp/infraguard-ingest.json

      - name: POST to InfraGuard
        if: steps.transform.outputs.count != '0'
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL -S -X POST \
            -H "Content-Type: application/json" \
            --data @/tmp/infraguard-ingest.json \
            "${INFRAGUARD_URL}/api/v1/ingest"

      - name: No findings to ingest
        if: steps.transform.outputs.count == '0'
        run: |
          echo "OSV reported 0 vulnerabilities. InfraGuard requires at least one entry — POST skipped."
          echo "Ensure gradle.lockfile was generated and dependency versions are known to OSV."

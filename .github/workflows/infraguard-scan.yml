# InfraGuard: OSV Scanner → transform.py → POST /api/v1/ingest
#
# This repo intentionally pins vulnerable dependencies in build.gradle (Spring Boot 2.6.x,
# Log4j 2.14.1, old H2, etc.) so OSV reports real findings — not a "clean" app.
#
# Flow:
#   1. osv-scanner scan -r .  → reads build.gradle / lockfiles (no Gradle build in CI)
#   2. transform.py           → { project_id, repo_name, vulnerabilities[] } per InfraGuard API
#   3. curl POST              → ${INFRAGUARD_URL}/api/v1/ingest
#
# Optional: set repository secrets INFRAGUARD_PROJECT_ID and INFRAGUARD_URL (defaults below).
# Docker image build is not required for dependency scanning; keep Dockerfile for local runs.

name: InfraGuard OSV Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  osv-scan:
    runs-on: ubuntu-latest
    env:
      REPO_NAME: ${{ github.repository }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve InfraGuard target
        shell: bash
        env:
          SECRET_PROJECT_ID: ${{ secrets.INFRAGUARD_PROJECT_ID }}
          SECRET_URL: ${{ secrets.INFRAGUARD_URL }}
        run: |
          set -euo pipefail
          if [ -n "${SECRET_PROJECT_ID}" ]; then
            echo "PROJECT_ID=${SECRET_PROJECT_ID}" >> "$GITHUB_ENV"
          else
            echo "PROJECT_ID=0f5330ce-dd0b-437f-881c-a0b3ac959bd6" >> "$GITHUB_ENV"
          fi
          if [ -n "${SECRET_URL}" ]; then
            echo "INFRAGUARD_URL=${SECRET_URL}" >> "$GITHUB_ENV"
          else
            echo "INFRAGUARD_URL=https://infraguard-production.up.railway.app" >> "$GITHUB_ENV"
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install osv-scanner
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL https://github.com/google/osv-scanner/releases/latest/download/osv-scanner_linux_amd64 -o osv-scanner
          chmod +x osv-scanner
          sudo mv osv-scanner /usr/local/bin/osv-scanner

      - name: Run OSV scan (repository dependencies)
        shell: bash
        run: |
          set -euo pipefail
          set +e
          osv-scanner scan -r . --format json > /tmp/osv-report.json
          rc=$?
          set -e
          # Exit 1 = vulnerabilities present (expected for this demo repo)
          if [ "$rc" -ne 0 ] && [ "$rc" -ne 1 ]; then
            echo "osv-scanner failed with exit code $rc"
            exit "$rc"
          fi
          if [ ! -s /tmp/osv-report.json ]; then
            echo '{"results":[]}' > /tmp/osv-report.json
          fi

      - name: Transform for InfraGuard (/api/v1/ingest)
        id: transform
        shell: bash
        run: |
          set -euo pipefail
          python transform.py \
            --input /tmp/osv-report.json \
            --output /tmp/infraguard-ingest.json \
            --project-id "${PROJECT_ID}" \
            --repo-name "${REPO_NAME}"
          VULN_COUNT=$(python3 -c "import json; print(len(json.load(open('/tmp/infraguard-ingest.json'))['vulnerabilities']))")
          echo "count=$VULN_COUNT" >> "$GITHUB_OUTPUT"
          echo "## OSV → InfraGuard" >> "$GITHUB_STEP_SUMMARY"
          echo "Vulnerabilities in ingest payload: **$VULN_COUNT**" >> "$GITHUB_STEP_SUMMARY"
          echo "InfraGuard URL: \`${INFRAGUARD_URL}\`" >> "$GITHUB_STEP_SUMMARY"
          python3 << 'PY'
          import json
          with open("/tmp/osv-report.json") as f:
              d = json.load(f)
          for r in d.get("results", []):
              for p in r.get("packages", []):
                  for v in p.get("vulnerabilities", []):
                      print(v.get("id", ""), "-", (v.get("summary") or "")[:140])
          PY

      - name: Upload OSV JSON
        uses: actions/upload-artifact@v4
        with:
          name: osv-report
          path: /tmp/osv-report.json

      - name: Upload InfraGuard payload (debug)
        uses: actions/upload-artifact@v4
        with:
          name: infraguard-ingest
          path: /tmp/infraguard-ingest.json

      - name: POST to InfraGuard
        if: steps.transform.outputs.count != '0'
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL -S -X POST \
            -H "Content-Type: application/json" \
            --data @/tmp/infraguard-ingest.json \
            "${INFRAGUARD_URL}/api/v1/ingest"

      - name: No findings to ingest
        if: steps.transform.outputs.count == '0'
        run: |
          echo "OSV reported 0 vulnerabilities. InfraGuard requires at least one entry — POST skipped."
          echo "Check build.gradle pins vulnerable versions and re-run the scan."

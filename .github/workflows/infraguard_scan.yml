name: InfraGuard Java OSV Scan

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  scan-java-repo:
    runs-on: ubuntu-latest
    
    env:
      PROJECT_ID: "0f5330ce-dd0b-437f-881c-a0b3ac959bd6"
      INFRAGUARD_URL: "https://infraguard-production.up.railway.app"
      REPO_NAME: ${{ github.repository }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # FIX: Generate a dependency list that osv-scanner can actually parse
      - name: Generate Dependency List
        run: |
          chmod +x gradlew
          ./gradlew dependencies --configuration implementation > dependencies.txt

      - name: Install osv-scanner
        run: |
          curl -fsSL https://github.com/google/osv-scanner/releases/latest/download/osv-scanner_linux_amd64 -o osv-scanner
          chmod +x osv-scanner
          sudo mv osv-scanner /usr/local/bin/osv-scanner

      - name: Run Scan
        run: |
          # We scan the generated dependencies.txt file specifically
          osv-scanner scan --file dependencies.txt --format json > /tmp/osv-report.json || true
          
          if [ ! -s /tmp/osv-report.json ]; then
            echo "[]" > /tmp/osv-report.json
          fi

      - name: Transform report
        id: transform
        run: |
          python transform.py \
            --input /tmp/osv-report.json \
            --output /tmp/infraguard-ingest.json \
            --project-id "${{ env.PROJECT_ID }}" \
            --repo-name "${{ env.REPO_NAME }}"
          
          VULN_COUNT=$(python3 -c "import json; print(len(json.load(open('/tmp/infraguard-ingest.json'))['vulnerabilities']))")
          echo "count=$VULN_COUNT" >> $GITHUB_OUTPUT

      - name: Send report to InfraGuard
        if: steps.transform.outputs.count != '0'
        run: |
          curl -fsSL -X POST \
            -H "Content-Type: application/json" \
            --data @/tmp/infraguard-ingest.json \
            "${{ env.INFRAGUARD_URL }}/api/v1/ingest"

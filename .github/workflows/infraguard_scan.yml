name: InfraGuard Java OSV Scan

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  scan-java-repo:
    runs-on: ubuntu-latest
    
    env:
      PROJECT_ID: "0f5330ce-dd0b-437f-881c-a0b3ac959bd6"
      INFRAGUARD_URL: "https://infraguard-production.up.railway.app"
      REPO_NAME: ${{ github.repository }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # Using a stable version

      - name: Install osv-scanner
        run: |
          curl -fsSL https://github.com/google/osv-scanner/releases/latest/download/osv-scanner_linux_amd64 -o osv-scanner
          chmod +x osv-scanner
          sudo mv osv-scanner /usr/local/bin/osv-scanner

      - name: Run Java Source Scan
        run: |
          # Try scanning. Note: Some versions use --experimental-all-packages
          # If it fails, we fall back to a standard recursive scan
          osv-scanner scan --recursive . --experimental-all-packages --format json > /tmp/osv-report.json || \
          osv-scanner scan --recursive . --format json > /tmp/osv-report.json || true
          
          # Force empty list if file is invalid/empty to prevent transform.py crash
          if [ ! -s /tmp/osv-report.json ]; then
            echo "[]" > /tmp/osv-report.json
          fi

      - name: Transform report
        id: transform
        run: |
          # We capture the output to see if we found anything
          python transform.py \
            --input /tmp/osv-report.json \
            --output /tmp/infraguard-ingest.json \
            --project-id "${{ env.PROJECT_ID }}" \
            --repo-name "${{ env.REPO_NAME }}"
          
          # Count vulnerabilities to decide if we should push
          VULN_COUNT=$(python3 -c "import json; print(len(json.load(open('/tmp/infraguard-ingest.json'))['vulnerabilities']))")
          echo "count=$VULN_COUNT" >> $GITHUB_OUTPUT

      - name: Send report to InfraGuard
        # Only push if vulnerabilities > 0 to avoid 422 error
        if: steps.transform.outputs.count != '0'
        run: |
          curl -fsSL -X POST \
            -H "Content-Type: application/json" \
            --data @/tmp/infraguard-ingest.json \
            "${{ env.INFRAGUARD_URL }}/api/v1/ingest"

name: InfraGuard YTD OSV Ingest

on:

  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  ytd-ingest:
    runs-on: ubuntu-latest
    env:
      REPO_NAME: ${{ github.repository }}
      YTD_FILTER: ${{ vars.YTD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve InfraGuard target and variables
        shell: bash
        env:
          SECRET_PROJECT_ID: ${{ secrets.INFRAGUARD_PROJECT_ID }}
          SECRET_URL: ${{ secrets.INFRAGUARD_URL }}
        run: |
          set -euo pipefail
          
          if [ -n "${SECRET_PROJECT_ID}" ]; then
            echo "PROJECT_ID=${SECRET_PROJECT_ID}" >> "$GITHUB_ENV"
          else
            echo "PROJECT_ID=fb06957d-066d-42a7-b020-99eee25d50b9" >> "$GITHUB_ENV"
          fi
          
          if [ -n "${SECRET_URL}" ]; then
            echo "INFRAGUARD_URL=${SECRET_URL}" >> "$GITHUB_ENV"
          else
            echo "INFRAGUARD_URL=https://infraguard-production.up.railway.app" >> "$GITHUB_ENV"
          fi
          
          # Handle the dynamic YTD variable from GitHub Repo Variables
          if [ -z "${YTD_FILTER:-}" ]; then
            echo "YTD variable not found. Defaulting to 1 day ago."
            echo "YTD_FILTER=$(date -d 'yesterday' +%Y-%m-%d)" >> "$GITHUB_ENV"
          else
            echo "Using YTD filter from vars: $YTD_FILTER"
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch and Transform YTD Vulnerabilities
        id: transform
        shell: bash
        run: |
          set -euo pipefail
          
          python transform.py \
            --ytd "${YTD_FILTER}" \
            --output /tmp/infraguard-ingest.json \
            --project-id "${PROJECT_ID}" \
            --repo-name "${REPO_NAME}"

          VULN_COUNT=$(python3 -c "import json; print(len(json.load(open('/tmp/infraguard-ingest.json'))['vulnerabilities']))")
          echo "count=$VULN_COUNT" >> "$GITHUB_OUTPUT"
          
          echo "## OSV API → InfraGuard" >> "$GITHUB_STEP_SUMMARY"
          echo "Vulnerabilities fetched since $YTD_FILTER: **$VULN_COUNT**" >> "$GITHUB_STEP_SUMMARY"
          echo "InfraGuard URL: \`${INFRAGUARD_URL}\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload InfraGuard payload (debug)
        uses: actions/upload-artifact@v4
        with:
          name: infraguard-ingest
          path: /tmp/infraguard-ingest.json

      - name: POST to InfraGuard
        if: steps.transform.outputs.count != '0'
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL -S -X POST \
            -H "Content-Type: application/json" \
            --data @/tmp/infraguard-ingest.json \
            "${INFRAGUARD_URL}/api/v1/ingest"

      - name: No findings to ingest
        if: steps.transform.outputs.count == '0'
        run: |
          echo "OSV reported 0 modified vulnerabilities since $YTD_FILTER. POST skipped."
